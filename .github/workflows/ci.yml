name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run lint
        run: |
          if npm run -s lint; then echo "lint passed"; exit 0; else echo "lint failed"; exit 1; fi

      - name: Prettier check
        run: |
          if npm run -s format:check; then echo "prettier check passed"; else echo "prettier check failed"; exit 1; fi
